<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Millionaire Bot - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>🎰 Dream Millionaire Bot</h1>
            <p class="subtitle">Login to access game signals</p>
            
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            
            <form method="POST">
                <div class="form-group">
                    <label for="telegram_id">Telegram User ID</label>
                    <input type="text" id="telegram_id" name="telegram_id" placeholder="Enter your Telegram User ID" required>
                </div>
                
                <div class="form-group">
                    <label for="code">8-Digit Access Code</label>
                    <input type="text" id="code" name="code" placeholder="Enter 8-digit code" maxlength="8" required>
                </div>
                
                <button type="submit">Login</button>
            </form>
            
            <div class="info">
                <p>Don't have access? Contact @Jimmy_716 on Telegram</p>
            </div>
        </div>
    </div>
</body>
</html>
